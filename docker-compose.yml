name: dadjokes

services: 
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    container_name: dadjokes-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: dadjokes
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: dadjokes
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadjokes"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Express API ----------
  api:
    build:
      context: ./api
      target: dev
    container_name: dadjokes-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dadjokes
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      DB_NAME: dadjokes
      REDIS_URL: redis://redis:6379
    secrets:
      - postgres_password
    depends_on:
      db:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    restart: unless-stopped

    # ---- API Watch ----
    # command: ["node", "--watch", "/app/src/index.ts"]
    develop:
      watch:
        - path: ./api/src
          target: /app/src
          action: sync
        - path: ./api/package.json
          target: /app/package.json
          action: rebuild
        - path: ./api/package-lock.json
          target: /app/package-lock.json
          action: rebuild
  
  # ---------- Redis Cache ----------
  # redis:
  #   image: redis:7-alpine
  #   container_name: dadjokes-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379" # Local Inspection
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ---------- React Frontend (served by nginx) ----------
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: dadjokes-frontend
    ports:
      # - "8080:80"
      - "8080:5173"
    depends_on:
      - api
    restart: unless-stopped

    # ---- Frontend Watch ----
    # command: ["npm", "run", "dev"]
    develop:
      watch:
        - path: ./frontend/src
          target: /app/src
          action: sync
        - path: ./frontend/index.html
          target: /app/index.html
          action: sync
        - path: ./frontend/nginx.conf
          target: /etc/nginx/conf.d/default.conf
          action: sync+restart
        - path: ./frontend/package.json
          target: /app/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          target: /app/package-lock.json
          action: rebuild
  
  # ---------- pgAdmin  ----------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dadjokes-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    ports:
      - "5050:80"
    secrets:
      - pgadmin_password
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin



secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
  

volumes:
  pgdata:
  pgadmin_data: